name: lgsteel

networks:
  lgsteel_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  lgsteel_meta_db_data:
  lgsteel_biz_db_data:
  lgsteel_redis_data:
  lgsteel_chroma_data:
  lgsteel_excel_files:

services:

  frontend:
    container_name: lgsteel_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    networks:
      - lgsteel_net
    restart: always
    labels:
      project: lgsteel

  nginx:
    container_name: lgsteel_nginx
    image: nginx:1.25-alpine
    ports:
      - "8100:80"
      - "8143:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - lgsteel_net
    depends_on:
      - backend
      - frontend
    restart: always
    labels:
      project: lgsteel

  backend:
    container_name: lgsteel_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      APP_ENV: production
    env_file:
      - .env
    volumes:
      - lgsteel_excel_files:/app/files/excel
    ports:
      - "127.0.0.1:8101:8000"
    networks:
      - lgsteel_net
    depends_on:
      meta_db:
        condition: service_healthy
      biz_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    labels:
      project: lgsteel

  celery:
    container_name: lgsteel_celery
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A app.worker worker --loglevel=info --concurrency=4 -Q celery,excel,embed
    environment:
      APP_ENV: production
    env_file:
      - .env
    volumes:
      - lgsteel_excel_files:/app/files/excel
    networks:
      - lgsteel_net
    depends_on:
      meta_db:
        condition: service_healthy
      biz_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    labels:
      project: lgsteel

  meta_db:
    container_name: lgsteel_meta_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lgsteel_meta
      POSTGRES_USER: ${META_DB_USER}
      POSTGRES_PASSWORD: ${META_DB_PASSWORD}
    volumes:
      - lgsteel_meta_db_data:/var/lib/postgresql/data
      - ./scripts/init_meta.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5441:5432"
    networks:
      - lgsteel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${META_DB_USER} -d lgsteel_meta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    labels:
      project: lgsteel

  biz_db:
    container_name: lgsteel_biz_db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lgsteel_biz
      POSTGRES_USER: ${BIZ_DB_USER}
      POSTGRES_PASSWORD: ${BIZ_DB_PASSWORD}
    volumes:
      - lgsteel_biz_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5442:5432"
    networks:
      - lgsteel_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BIZ_DB_USER} -d lgsteel_biz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    labels:
      project: lgsteel

  redis:
    container_name: lgsteel_redis
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - lgsteel_redis_data:/data
    ports:
      - "127.0.0.1:6391:6379"
    networks:
      - lgsteel_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    labels:
      project: lgsteel

  chromadb:
    container_name: lgsteel_chromadb
    image: chromadb/chroma:0.5.17
    volumes:
      - lgsteel_chroma_data:/chroma/chroma
    ports:
      - "127.0.0.1:8191:8000"
    networks:
      - lgsteel_net
    restart: always
    labels:
      project: lgsteel
