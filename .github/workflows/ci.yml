name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================
  # 后端：代码质量 + 单元测试
  # ============================================================
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres_meta:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lgsteel_meta_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5441:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres_biz:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lgsteel_biz_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5442:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6391:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint check
        run: ruff check .

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true   # 阶段零允许 warning，阶段一后改为 false

      - name: Run unit tests
        env:
          APP_ENV: development
          META_DB_HOST: 127.0.0.1
          META_DB_PORT: 5441
          META_DB_USER: test_user
          META_DB_PASSWORD: test_pass
          META_DB_NAME: lgsteel_meta_test
          BIZ_DB_HOST: 127.0.0.1
          BIZ_DB_PORT: 5442
          BIZ_DB_USER: test_user
          BIZ_DB_PASSWORD: test_pass
          BIZ_DB_NAME: lgsteel_biz_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6391
          REDIS_PASSWORD: ""
          APP_SECRET_KEY: ci-test-secret-key-32-chars-xxxx
          QIANWEN_API_KEY: mock
          WENXIN_API_KEY: mock
          WENXIN_SECRET_KEY: mock
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend-unit
        continue-on-error: true

  # ============================================================
  # 前端：类型检查 + Lint
  # ============================================================
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint
        continue-on-error: true   # 阶段零允许 warning

      - name: Build check
        run: npm run build
