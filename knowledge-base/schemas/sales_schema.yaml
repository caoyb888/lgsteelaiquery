# ============================================================
# 销售域 — 数据字典 Schema
# ============================================================

domain: sales
display_name: 销售数据
description: 销售部订单台账、回款明细、客户统计等

tables:

  - table_key: sales_orders
    display_name: 销售订单台账
    description: 销售订单明细，含客户、产品、金额、状态
    primary_keys: [order_no]
    update_frequency: weekly
    fields:
      - std_name: order_no
        display_name: 订单号
        field_type: text
        required: true
      - std_name: order_date
        display_name: 下单日期
        field_type: date
        required: true
      - std_name: customer_name
        display_name: 客户名称
        field_type: text
        required: true
      - std_name: customer_code
        display_name: 客户编码
        field_type: text
        required: false
      - std_name: product_line
        display_name: 产品线
        field_type: text
        required: false
        example_values: [板材, 型钢, 线材]
      - std_name: product_name
        display_name: 产品名称
        field_type: text
        required: true
      - std_name: product_code
        display_name: 产品编码
        field_type: text
        required: false
      - std_name: sales_volume
        display_name: 销售量
        field_type: float
        unit: 吨
        required: true
      - std_name: unit_price
        display_name: 合同单价
        field_type: float
        unit: 元/吨
        required: false
      - std_name: revenue
        display_name: 合同金额
        field_type: float
        unit: 万元
        required: true
      - std_name: delivery_date
        display_name: 发货日期
        field_type: date
        required: false

  - table_key: sales_payment_records
    display_name: 回款明细
    description: 销售货款回款记录
    primary_keys: [order_no, payment_date]
    update_frequency: weekly
    fields:
      - std_name: order_no
        display_name: 订单号
        field_type: text
        required: true
      - std_name: customer_name
        display_name: 客户名称
        field_type: text
        required: true
      - std_name: payment_date
        display_name: 回款日期
        field_type: date
        required: true
      - std_name: payment_amount
        display_name: 回款金额
        field_type: float
        unit: 万元
        required: true

join_keys:
  - from_table: sales_orders
    to_table: sales_payment_records
    keys: [order_no, customer_name]
  - from_table: sales_orders
    to_table: finance_monthly_revenue
    keys: [product_name]
