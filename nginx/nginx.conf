# ============================================================
# 莱钢 AI 问数 — Nginx 配置
# 宿主机端口：8100(HTTP) / 8143(HTTPS)
# 容器内端口：80 / 443
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 60m;   # Excel 文件最大 50MB，留余量

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/font-woff2;

    # ---- HTTP 服务 ----
    # 使用 Docker 内置 DNS，强制动态解析服务名（防止容器重建后 IP 变化导致 502）
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # 如果配置了 SSL，取消注释下行强制跳转 HTTPS
        # return 301 https://$host:8143$request_uri;

        # 前端静态资源（反向代理到前端容器）
        location / {
            set $frontend http://lgsteel_frontend:80;
            proxy_pass         $frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # SPA 路由回退
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # 后端 API 代理
        location /api/ {
            set $backend http://lgsteel_backend:8000;
            proxy_pass         $backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Request-ID $request_id;

            # 长查询超时（LLM 调用最长 ~15s × 3次重试）
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # 健康检查端点（Nginx 自身）
        location /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ---- HTTPS 服务（证书准备好后启用）----
    # server {
    #     listen 443 ssl http2;
    #     server_name internal.lgsteel.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/server.crt;
    #     ssl_certificate_key /etc/nginx/ssl/server.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://lgsteel_frontend:80;
    #         # ... 同上
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://lgsteel_backend:8000;
    #         # ... 同上
    #     }
    # }
}
